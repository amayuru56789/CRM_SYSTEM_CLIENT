<!-- src/app/layout/main-layout/main-layout.component.html -->
<div class="layout-wrapper">

  <!-- Sidebar desktop -->
  @if (!isMobile()) {
    <app-sidebar
      [collapsed]="sidebarCollapsed()"
      (closeSidebar)="mobileOpen.set(false)"/>
  }

  <!-- Mobile overlay -->
  @if (isMobile() && mobileOpen()) {
    <div class="mobile-overlay"
         (click)="mobileOpen.set(false)"></div>
    <div class="mobile-sidebar">
      <app-sidebar
        [collapsed]="false"
        (closeSidebar)="mobileOpen.set(false)"/>
    </div>
  }

  <!-- Main content area -->
  <div class="layout-main">

    <!-- Topbar -->
    <app-topbar
      [pageTitle]="pageTitle() ?? 'Dashboard'"
      (toggleSidebar)="toggleSidebar()"/>

    <!-- Page content -->
    <main class="layout-content">
      <router-outlet/>
    </main>

    <!-- Footer — shows on every page -->
    <footer class="layout-footer">
      <span>© {{ currentYear }} AVC Solutions. All rights reserved.</span>
      <span class="footer-version">CRMPro v1.0.0</span>
    </footer>

  </div>

</div>
